<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORDLE - by mtahatavaci</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Mono', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a0e3f 50%, #0f1a3f 100%);
            color: #e0e0ff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 0, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 255, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 520px;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #00ffff, #ff00ff, #00ffff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease infinite;
            letter-spacing: 3px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .subtitle {
            font-size: 0.85rem;
            color: #a0a0ff;
            letter-spacing: 2px;
            opacity: 0.8;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            padding: 10px 20px;
            border: 2px solid;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .btn-stats {
            background: rgba(0, 255, 255, 0.1);
            border-color: #00ffff;
            color: #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .btn-stats:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.6);
            transform: translateY(-2px);
        }

        .btn-new {
            background: rgba(255, 0, 255, 0.1);
            border-color: #ff00ff;
            color: #ff00ff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
        }

        .btn-new:hover {
            background: rgba(255, 0, 255, 0.2);
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.6);
            transform: translateY(-2px);
        }

        .message {
            text-align: center;
            min-height: 24px;
            margin-bottom: 16px;
            font-size: 0.95rem;
            color: #00ffff;
            animation: pulse 2s ease-in-out infinite;
            letter-spacing: 1px;
        }

        .message.success { color: #00ff00; }
        .message.error { color: #ff0055; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .timer {
            text-align: center;
            font-size: 2rem;
            font-family: 'Orbitron', sans-serif;
            color: #ff00ff;
            margin-bottom: 16px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
            font-weight: 700;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 24px;
            padding: 20px;
            background: rgba(10, 14, 39, 0.4);
            border: 2px solid rgba(0, 255, 255, 0.2);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: inset 0 0 20px rgba(0, 255, 255, 0.1);
        }

        .tile {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(30, 20, 60, 0.6);
            color: #e0e0ff;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .tile.filled {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(40, 30, 80, 0.8);
        }

        .tile.present {
            background: linear-gradient(135deg, #ff3b3b 0%, #cc0000 100%);
            border-color: #ff3b3b;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 59, 59, 0.6), inset 0 0 10px rgba(255, 59, 59, 0.3);
            animation: popIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .tile.correct {
            background: linear-gradient(135deg, #00ff41 0%, #00cc33 100%);
            border-color: #00ff41;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.6), inset 0 0 10px rgba(0, 255, 65, 0.3);
            animation: popIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .tile.absent {
            background: linear-gradient(135deg, #666 0%, #444 100%);
            border-color: #555;
            color: #ccc;
            animation: popIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .input-section { margin-bottom: 16px; }

        .input-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #a0a0ff;
            letter-spacing: 1px;
        }

        .input-boxes {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            padding: 12px;
            background: rgba(10, 14, 39, 0.4);
            border: 2px solid rgba(255, 0, 255, 0.2);
            border-radius: 8px;
        }

        .input-tile {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            border: 2px solid rgba(255, 0, 255, 0.3);
            border-radius: 6px;
            background: rgba(40, 10, 60, 0.6);
            color: #ff00ff;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .input-tile.active {
            border-color: #ff00ff;
            background: rgba(60, 20, 80, 0.8);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.5);
        }

        .info-text {
            text-align: center;
            font-size: 0.8rem;
            color: #888;
            margin-top: 12px;
            letter-spacing: 1px;
        }

        /* Stats Overlay */
        .stats-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .stats-card {
            background: linear-gradient(135deg, rgba(20, 10, 40, 0.95) 0%, rgba(10, 20, 50, 0.95) 100%);
            border: 2px solid #00ffff;
            border-radius: 16px;
            padding: 32px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
        }

        .stats-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: #00ffff;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .stats-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.3), transparent);
            margin: 16px 0;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0, 255, 255, 0.1);
        }

        .stat-label { color: #a0a0ff; font-size: 0.95rem; letter-spacing: 1px; }
        .stat-value { font-family: 'Orbitron', sans-serif; color: #00ff00; font-size: 1.4rem; font-weight: bold; }

        .close-btn {
            margin-top: 20px;
            width: 100%;
            background: linear-gradient(90deg, rgba(0, 255, 255, 0.1), rgba(255, 0, 255, 0.1));
            border: 2px solid #00ffff;
            color: #00ffff;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: linear-gradient(90deg, rgba(0, 255, 255, 0.2), rgba(255, 0, 255, 0.2));
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .stats-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(0, 255, 255, 0.2);
        }

        .stats-tab {
            padding: 10px 20px;
            background: none;
            border: none;
            color: #a0a0ff;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 1px;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .stats-tab.active { color: #00ffff; border-bottom-color: #00ffff; }

        .stats-content { display: none; max-height: 300px; overflow-y: auto; }
        .stats-content.active { display: flex;
            justify-content: center;
            align-items: center; }

        .history-item {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 10px;
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(0, 255, 255, 0.05);
            border-left: 3px solid #00ffff;
            border-radius: 4px;
            font-size: 0.85rem;
            align-items: center;
        }

        .history-item.won { border-left-color: #00ff41; }
        .history-item.lost { border-left-color: #ff0055; background: rgba(255, 0, 85, 0.05); }
        .history-word { font-family: 'Orbitron', sans-serif; font-weight: bold; color: #00ffff; letter-spacing: 2px; }
        .history-status.won { color: #00ff41; font-weight: bold; }
        .history-status.lost { color: #ff0055; font-weight: bold; }
        .history-empty { text-align: center; color: #888; padding: 20px; }

        /* Game Result Modal */
        .game-result-modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.98) 0%, rgba(20, 10, 50, 0.98) 100%);
            border: 2px solid #00ffff;
            border-radius: 20px;
            padding: 40px 50px;
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.3);
            text-align: center;
            max-width: 500px;
            min-width: 300px;
        }

        .game-result-modal.show {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }

        .game-result-modal.victory {
            border-color: #00ff41;
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.3);
        }

        .game-result-modal.defeat {
            border-color: #ff0055;
            box-shadow: 0 0 50px rgba(255, 0, 85, 0.3);
        }

        .result-icon { font-size: 4rem; margin-bottom: 20px; }

        .result-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 15px;
            letter-spacing: 3px;
        }

        .result-title.victory { color: #00ff41; text-shadow: 0 0 20px rgba(0, 255, 65, 0.6); }
        .result-title.defeat { color: #ff0055; text-shadow: 0 0 20px rgba(255, 0, 85, 0.6); }

        .result-stats {
            margin: 25px 0;
            display: flex;
            justify-content: space-around;
            gap: 20px;
        }

        .result-stat { display: flex; flex-direction: column; align-items: center; gap: 8px; }

        .result-stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: bold;
            color: #00ffff;
        }

        .result-stat-label { font-size: 0.85rem; color: #a0a0ff; letter-spacing: 1px; }

        .result-word {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 12px;
            padding: 15px 20px;
            margin: 20px 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: bold;
            color: #00ffff;
            letter-spacing: 3px;
        }

        .result-word.defeat {
            background: rgba(255, 0, 85, 0.1);
            border-color: rgba(255, 0, 85, 0.3);
            color: #ff0055;
        }

        .result-message { color: #a0a0ff; font-size: 0.95rem; margin-top: 15px; letter-spacing: 1px; }

        /* DÜZELTME: Modal'da Yeni Oyun ve Analiz butonları */
        .result-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .result-btn {
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            letter-spacing: 1px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            border: 2px solid;
        }

        .result-btn-analysis-win {
            background: rgba(0, 255, 65, 0.1);
            border-color: #00ff41;
            color: #00ff41;
        }

        .result-btn-analysis-win:hover {
            background: rgba(0, 255, 65, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
        }

        .result-btn-analysis-lose {
            background: rgba(255, 0, 85, 0.1);
            border-color: #ff0055;
            color: #ff0055;
        }

        .result-btn-analysis-lose:hover {
            background: rgba(255, 0, 85, 0.2);
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.5);
        }

        .result-btn-new {
            background: rgba(255, 0, 255, 0.1);
            border-color: #ff00ff;
            color: #ff00ff;
        }

        .result-btn-new:hover {
            background: rgba(255, 0, 255, 0.2);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }

        /* Guess Details Modal */
        .guess-details-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .guess-details-card {
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.98) 0%, rgba(20, 10, 50, 0.98) 100%);
            border: 2px solid #00ffff;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.3);
        }

        .guess-details-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: #00ffff;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .guess-entry {
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .guess-number { font-family: 'Orbitron', sans-serif; color: #00ffff; font-size: 0.9rem; margin-bottom: 10px; }

        .guess-tiles { display: flex; gap: 8px; margin-bottom: 15px; justify-content: center; }

        .guess-tile {
            width: 45px; height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            border-radius: 8px;
            border: 2px solid;
        }

        .guess-tile.correct { background: linear-gradient(135deg, #00ff41, #00cc33); border-color: #00ff41; color: #000; }
        .guess-tile.present { background: linear-gradient(135deg, #ff3b3b, #cc0000); border-color: #ff3b3b; color: #fff; }
        .guess-tile.absent { background: linear-gradient(135deg, #666, #444); border-color: #555; color: #ccc; }

        .keyboard {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 18px;
            align-items: center;
            width: 100%;
            max-width: 520px;
            margin-left: auto;
            margin-right: auto;
        }
        .keyboard-row {
            display: flex;
            gap: 5px;
            justify-content: center;
            width: 100%;
        }
        .key {
            flex: 1 1 0;
            min-width: 0;
            height: 52px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            background: rgba(0, 255, 255, 0.08);
            border: 1px solid rgba(0, 255, 255, 0.35);
            color: #e0ffff;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
            text-transform: uppercase;
            user-select: none;
            padding: 0;
        }
        .key:hover:not(:disabled) { background: rgba(0, 255, 255, 0.2); transform: translateY(-1px); }
        .key:active:not(:disabled) { transform: translateY(1px); }
        .key:disabled { opacity: 0.4; cursor: not-allowed; }
        .key.wide { flex: 1.6 1 0; font-size: 0.75rem; letter-spacing: 1px; }
        .key.correct { background: linear-gradient(135deg, #00ff41, #00cc33); border-color: #00ff41; color: #000; }
        .key.absent  { background: linear-gradient(135deg, #3a3a3a, #222); border-color: #444; color: #888; }

        .guess-analysis { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }

        .analysis-item {
            background: rgba(0, 255, 255, 0.1);
            padding: 8px;
            border-radius: 6px;
            border-left: 3px solid;
            text-align: center;
            font-size: 0.85rem;
        }

        .analysis-item.found { border-color: #00ff41; color: #00ff41; }
        .analysis-item.wrong-pos { border-color: #ffaa00; color: #ffaa00; }
        .analysis-item.not-found { border-color: #888; color: #888; }
        .analysis-label { font-size: 0.65rem; opacity: 0.7; }

        .close-details-btn {
            width: 100%;
            margin-top: 20px;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            color: #00ffff;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .shake {
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .title { font-size: 2.5rem; }
            .container { padding: 12px; }
            button { padding: 8px 14px; font-size: 0.8rem; }
            .tile { font-size: 1.5rem; }
            .input-tile { font-size: 1.3rem; }
            .timer { font-size: 1.5rem; }
            .game-result-modal { padding: 30px 20px; }
            .result-title { font-size: 1.8rem; }
        }
    </style>




<style>
/* ══════════════════════════════════════════
   TITLE ROW — characters flanking the title
   ══════════════════════════════════════════ */
.header {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 30px;
    animation: slideDown 0.8s ease-out;
}

.title-row {
    display: flex;
    flex-direction: row;
    align-items: center;        /* vertically center everything */
    justify-content: center;
    width: 100%;
    gap: 12px;
}

.char-slot {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
}

.char-slot img {
    /* height matches the title text block (~80px) */
    height: clamp(94px, 12.5vw, 140px);
    width: auto;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    pointer-events: none;
    display: block;
}

#char-left  { filter: drop-shadow(0 0 8px rgba(0, 255, 255, 0.5)); }
#char-right { filter: drop-shadow(0 0 8px rgba(255, 0, 255, 0.5)); }

.title-center {
    flex: 0 0 auto;
    text-align: center;
}

/* ── Tablet ── */
@media (max-width: 768px) {
    .char-slot img {
        height: clamp(78px, 10.94vw, 109px);
    }
    .title-row { gap: 8px; }
}

/* ── Mobile ── */
@media (max-width: 480px) {
    .char-slot img {
        height: clamp(59px, 14.06vw, 84px);
    }
    .title-row { gap: 6px; }
}

/* ── Very small ── */
@media (max-width: 360px) {
    .char-slot img { height: 52px; }
    .title-row { gap: 4px; }
}

/* ── Keyboard responsive ── */
@media (max-width: 600px) {
    .key { height: 46px; font-size: 0.85rem; }
    .key.wide { font-size: 0.65rem; }
}

    <script>
        const MAX_ATTEMPTS = 6;
        const WORD_LENGTH = 5;
        const STATE_KEY = 'wordle_state';
        const STATS_KEY = 'wordle_stats';
        const HISTORY_KEY = 'wordle_history';

        const FALLBACK_WORDS = [
            "BRAIN", "HOUSE", "PLANT", "STONE", "DANCE",
            "MUSIC", "PEACE", "DREAM", "SWIFT", "LIGHT",
            "FLAME", "OCEAN", "CLASH", "RIVER", "FROST",
            "CRISP", "BLAZE", "SPARK", "GRIND", "CHALK"
        ];

        let state = null;
        let stats = null;
        let currentInput = '';
        let timerInterval = null;
        let elapsedSeconds = 0;
        let inputEnabled = false;
        let timerStarted = false;

        window.addEventListener('DOMContentLoaded', () => {
            loadStats();
            renderKeyboard();
            initializeGame();
            setupEventListeners();
        });

        const KEYBOARD_ROWS = [
            ['Q','W','E','R','T','Y','U','I','O','P'],
            ['A','S','D','F','G','H','J','K','L'],
            ['ENTER','Z','X','C','V','B','N','M','BACKSPACE']
        ];

        function renderKeyboard() {
            const kb = document.getElementById('keyboard');
            if (!kb) return;
            kb.innerHTML = '';
            KEYBOARD_ROWS.forEach(row => {
                const rowEl = document.createElement('div');
                rowEl.className = 'keyboard-row';
                row.forEach(k => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'key' + (k.length > 1 ? ' wide' : '');
                    btn.dataset.key = k;
                    btn.textContent = k === 'BACKSPACE' ? '⌫' : k;
                    btn.addEventListener('click', () => handleVirtualKey(k));
                    rowEl.appendChild(btn);
                });
                kb.appendChild(rowEl);
            });
        }

        function handleVirtualKey(key) {
            if (!inputEnabled || state.game_over || !timerStarted) return;
            if (key === 'ENTER') {
                if (currentInput.length === WORD_LENGTH) submitGuess();
                else { shakeAnimation(); showMessage('Word must be 5 letters'); }
                return;
            }
            if (key === 'BACKSPACE') {
                currentInput = currentInput.slice(0, -1);
            } else if (/^[A-Z]$/.test(key) && currentInput.length < WORD_LENGTH) {
                currentInput += key;
            }
            const hi = document.getElementById('hiddenInput');
            if (hi) hi.value = currentInput;
            updateInputDisplay();
        }

        function updateKeyboardState() {
            if (!state.secret_word) { resetKeyboardColors(); return; }
            const secretLetters = new Set(state.secret_word.split(''));
            const usedLetters = new Set();
            state.guesses.forEach(g => g.split('').forEach(ch => usedLetters.add(ch)));
            document.querySelectorAll('.key').forEach(btn => {
                const k = btn.dataset.key;
                btn.classList.remove('correct', 'present', 'absent');
                if (!usedLetters.has(k)) return;
                btn.classList.add(secretLetters.has(k) ? 'correct' : 'absent');
            });
        }

        function resetKeyboardColors() {
            document.querySelectorAll('.key').forEach(btn => {
                btn.classList.remove('correct', 'present', 'absent');
            });
        }

        function initializeGame() {
            if (hasValidStateFile()) {
                state = loadState();
                continueGame();
            } else {
                startNewGame();
            }
            renderBoard();
        }

        function getInitialState() {
            return { secret_word: null, guesses: [], current_row: 0, game_over: false, won: false };
        }

        function getInitialStats() {
            return { games_played: 0, wins: 0, current_streak: 0, max_streak: 0, total_win_time: 0, win_count: 0, last_solve_time: 0 };
        }

        function loadState() {
            const saved = localStorage.getItem(STATE_KEY);
            return saved ? JSON.parse(saved) : getInitialState();
        }

        function saveState() {
            if (state.secret_word) localStorage.setItem(STATE_KEY, JSON.stringify(state));
        }

        function hasValidStateFile() {
            const saved = localStorage.getItem(STATE_KEY);
            if (!saved) return false;
            const s = JSON.parse(saved);
            return s.secret_word && s.secret_word.length === 5 && !s.game_over;
        }

        function deleteState() { localStorage.removeItem(STATE_KEY); }

        function loadStats() {
            const saved = localStorage.getItem(STATS_KEY);
            stats = saved ? JSON.parse(saved) : getInitialStats();
        }

        function saveStats() { localStorage.setItem(STATS_KEY, JSON.stringify(stats)); }

        function getGameHistory() {
            const saved = localStorage.getItem(HISTORY_KEY);
            return saved ? JSON.parse(saved) : [];
        }

        function saveGameHistory(history) { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); }

        // BUG FIX: guesses parametresi artık string[] dizisi (sayı değil)
        function addGameToHistory(won, word, guesses, time) {
            const history = getGameHistory();
            const today = new Date().toISOString().split('T')[0];
            const guessDetails = guesses.map(guess => ({
                word: guess,
                scores: scoreGuess(guess, word)
            }));
            const gameRecord = {
                date: today,
                word: word,
                guesses: guesses.length,
                time: time,
                won: won,
                guessDetails: guessDetails
            };
            history.unshift(gameRecord);
            if (history.length > 100) history.pop();
            saveGameHistory(history);
        }

        function scoreGuess(guess, secret) {
            guess = guess.toUpperCase();
            secret = secret.toUpperCase();
            const scores = ['absent', 'absent', 'absent', 'absent', 'absent'];
            const secretList = secret.split('');
            for (let i = 0; i < guess.length; i++) {
                if (guess[i] === secret[i]) { scores[i] = 'correct'; secretList[i] = null; }
            }
            for (let i = 0; i < guess.length; i++) {
                if (scores[i] === 'absent' && secretList.includes(guess[i])) {
                    scores[i] = 'present';
                    secretList[secretList.indexOf(guess[i])] = null;
                }
            }
            return scores;
        }

        async function validateWordExists(word) {
            try {
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word.toLowerCase()}`);
                return response.status === 200;
            } catch (e) { return true; }
        }

        function startNewGame() {
            deleteState();
            state = getInitialState();
            currentInput = '';
            stopTimer();
            elapsedSeconds = 0;
            document.getElementById('timer').textContent = '00:00';
            timerStarted = false;
            inputEnabled = false;
            closeGameResultModal();
            renderBoard();
            updateInputDisplay();
            fetchSecretWord();
            updateStartButtonState();
        }

        function continueGame() {
            currentInput = '';
            inputEnabled = false;
            showMessage('Game paused. Click START to resume.');
        }

        async function fetchSecretWord() {
            showMessage('Loading word...');
            try {
                const response = await fetch('https://random-word-api.herokuapp.com/word?length=5');
                const data = await response.json();
                if (data && data[0]) {
                    let word = data[0].toUpperCase();
                    if (word.length === 5 && /^[A-Z]{5}$/.test(word)) {
                        state.secret_word = word;
                        saveState();
                        showMessage('Ready! Click START to begin.');
                        return;
                    }
                }
            } catch (e) { console.error('Word fetch failed:', e); }
            state.secret_word = FALLBACK_WORDS[Math.floor(Math.random() * FALLBACK_WORDS.length)];
            saveState();
            showMessage('Ready! Click START to begin.');
        }

        function startGameTimer() {
            if (!state.secret_word) { showMessage('Loading word...'); return; }
            if (timerStarted) return;
            timerStarted = true;
            inputEnabled = true;
            startTimer();
            showMessage('Game started! Make your guess.');
            document.getElementById('hiddenInput').focus();
            updateStartButtonState();
        }

        function updateStartButtonState() {
            const startBtn = document.getElementById('startBtn');
            if (state.game_over) {
                startBtn.textContent = '🔄 NEW';
                startBtn.onclick = resetGame;
            } else if (timerStarted) {
                startBtn.textContent = '⏸ PAUSE';
                startBtn.onclick = pauseGameTimer;
            } else {
                startBtn.textContent = '▶ START';
                startBtn.onclick = startGameTimer;
            }
        }

        function pauseGameTimer() {
            timerStarted = false;
            inputEnabled = false;
            stopTimer();
            showMessage('Paused. Click RESUME to continue.');
            const startBtn = document.getElementById('startBtn');
            startBtn.textContent = '▶ RESUME';
            startBtn.onclick = startGameTimer;
        }

        function resetGame() {
            timerStarted = false;
            startNewGame();
        }

        function renderBoard() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';
            for (let row = 0; row < MAX_ATTEMPTS; row++) {
                for (let col = 0; col < WORD_LENGTH; col++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    if (row < state.guesses.length && state.secret_word) {
                        const guess = state.guesses[row];
                        const scores = scoreGuess(guess, state.secret_word);
                        tile.textContent = guess[col];
                        tile.classList.add(scores[col]);
                    }
                    gameBoard.appendChild(tile);
                }
            }
            updateKeyboardState();
        }

        function updateInputDisplay() {
            const inputBoxes = document.getElementById('inputBoxes');
            inputBoxes.innerHTML = '';
            for (let i = 0; i < WORD_LENGTH; i++) {
                const box = document.createElement('div');
                box.className = 'input-tile';
                if (i < currentInput.length) {
                    box.textContent = currentInput[i].toUpperCase();
                    box.classList.add('active');
                }
                inputBoxes.appendChild(box);
            }
            document.getElementById('charCount').textContent = `${currentInput.length}/5`;
        }

        function showMessage(msg, persist) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.classList.remove('success', 'error');
            if (msg.includes('✦') || msg.includes('VICTORY') || msg.includes('started')) el.classList.add('success');
            if (msg.includes('◆') || msg.includes('DEFEAT') || msg.includes('valid') || msg.includes('Already')) el.classList.add('error');
            if (!persist) {
                setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 3000);
            }
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            if (timerInterval) return;
            timerInterval = setInterval(() => {
                elapsedSeconds++;
                document.getElementById('timer').textContent = formatTime(elapsedSeconds);
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        }

        function setupEventListeners() {
            const hiddenInput = document.getElementById('hiddenInput');
            document.addEventListener('click', (e) => {
                if (inputEnabled && !state.game_over && timerStarted) hiddenInput.focus();
            });
            hiddenInput.addEventListener('input', (e) => {
                if (!inputEnabled || state.game_over || !timerStarted) { e.target.value = ''; return; }
                let value = e.target.value.toUpperCase().replace(/[^A-Z]/g, '');
                if (value.length > WORD_LENGTH) value = value.slice(0, WORD_LENGTH);
                currentInput = value;
                hiddenInput.value = value;
                updateInputDisplay();
            });
            hiddenInput.addEventListener('keydown', (e) => {
                if (!inputEnabled || state.game_over || !timerStarted) return;
                if (e.key === 'Enter' && currentInput.length === WORD_LENGTH) {
                    submitGuess();
                    hiddenInput.value = '';
                } else if (e.key === 'Backspace') {
                    setTimeout(() => {
                        currentInput = hiddenInput.value.toUpperCase().replace(/[^A-Z]/g, '');
                        updateInputDisplay();
                    }, 0);
                }
            });
        }

        async function submitGuess() {
            const guess = currentInput.toUpperCase();
            if (guess.length !== WORD_LENGTH) { shakeAnimation(); showMessage('Word must be 5 letters'); return; }
            const isValid = await validateWordExists(guess);
            if (!isValid) { shakeAnimation(); showMessage('Not a valid word'); return; }
            if (state.guesses.includes(guess)) { shakeAnimation(); showMessage('Already guessed'); return; }

            state.guesses.push(guess);
            state.current_row++;
            currentInput = '';
            updateInputDisplay();
            saveState();
            renderBoard();

            if (guess === state.secret_word) {
                stopTimer();
                state.game_over = true;
                state.won = true;
                saveState();
                // BUG FIX: state.guesses (dizi) geçiriyoruz, .length değil
                updateStats(true, elapsedSeconds, state.guesses);
                inputEnabled = false;
                timerStarted = false;
                updateStartButtonState();
                setTimeout(() => showGameResultModal(true, state.guesses.length, elapsedSeconds, state.secret_word), 400);
            } else if (state.current_row >= MAX_ATTEMPTS) {
                stopTimer();
                state.game_over = true;
                state.won = false;
                saveState();
                // BUG FIX: state.guesses (dizi) geçiriyoruz, .length değil
                updateStats(false, elapsedSeconds, state.guesses);
                inputEnabled = false;
                timerStarted = false;
                updateStartButtonState();
                setTimeout(() => showGameResultModal(false, state.guesses.length, elapsedSeconds, state.secret_word), 400);
            } else {
                const remaining = MAX_ATTEMPTS - state.current_row;
                showMessage(`${remaining} guess${remaining !== 1 ? 'es' : ''} left`);
            }
        }

        function shakeAnimation() {
            const gb = document.getElementById('gameBoard');
            gb.classList.add('shake');
            setTimeout(() => gb.classList.remove('shake'), 300);
        }

        // BUG FIX: guesses parametresi eklendi (string[])
        function updateStats(won, solveTime, guesses) {
            stats.games_played++;
            stats.last_solve_time = solveTime;
            if (won) {
                stats.wins++;
                stats.total_win_time += solveTime;
                stats.win_count++;
                stats.current_streak++;
                if (stats.current_streak > stats.max_streak) stats.max_streak = stats.current_streak;
            } else {
                stats.current_streak = 0;
            }
            saveStats();
            // BUG FIX: guesses dizisini geçiriyoruz
            addGameToHistory(won, state.secret_word, guesses, solveTime);
        }

        function showGameResultModal(won, guessCount, time, word) {
            const modal = document.getElementById('gameResultModal');
            const icon = document.getElementById('resultIcon');
            const title = document.getElementById('resultTitle');
            const statsEl = document.getElementById('resultStats');
            const wordDisplay = document.getElementById('resultWord');
            const message = document.getElementById('resultMessage');
            const buttons = document.getElementById('resultButtons');

            modal.classList.remove('victory', 'defeat');
            title.classList.remove('victory', 'defeat');
            wordDisplay.classList.remove('defeat');

            if (won) {
                modal.classList.add('victory');
                icon.textContent = '✦';
                title.textContent = 'VICTORY';
                title.classList.add('victory');
                wordDisplay.textContent = word;
                message.textContent = 'Excellent! You solved it!';
                buttons.innerHTML = `
                    <button class="result-btn result-btn-analysis-win" onclick="showGuessDetails()">📊 VIEW ANALYSIS</button>
                    <button class="result-btn result-btn-new" onclick="resetGame()">🔄 NEW GAME</button>
                `;
            } else {
                modal.classList.add('defeat');
                icon.textContent = '◆';
                title.textContent = 'DEFEAT';
                title.classList.add('defeat');
                wordDisplay.textContent = word;
                wordDisplay.classList.add('defeat');
                message.textContent = 'Better luck next time!';
                buttons.innerHTML = `
                    <button class="result-btn result-btn-analysis-lose" onclick="showGuessDetails()">📊 VIEW ANALYSIS</button>
                    <button class="result-btn result-btn-new" onclick="resetGame()">🔄 NEW GAME</button>
                `;
            }

            statsEl.innerHTML = `
                <div class="result-stat">
                    <div class="result-stat-value">${guessCount}/${MAX_ATTEMPTS}</div>
                    <div class="result-stat-label">GUESSES</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value">${formatTime(time)}</div>
                    <div class="result-stat-label">TIME</div>
                </div>
            `;

            modal.classList.add('show');
        }

        function closeGameResultModal() {
            document.getElementById('gameResultModal').classList.remove('show');
        }

        function showGuessDetails() {
            const overlay = document.getElementById('guessDetailsOverlay');
            const detailsList = document.getElementById('guessDetailsList');
            if (!state.guesses || state.guesses.length === 0) {
                detailsList.innerHTML = '<div style="text-align:center;color:#888">No guesses found</div>';
                overlay.classList.remove('hidden');
                return;
            }
            let html = '';
            state.guesses.forEach((guess, index) => {
                const scores = scoreGuess(guess, state.secret_word);
                html += `
                    <div class="guess-entry">
                        <div class="guess-number">GUESS ${index + 1}: ${guess}</div>
                        <div class="guess-tiles">
                            ${guess.split('').map((letter, i) => `<div class="guess-tile ${scores[i]}">${letter}</div>`).join('')}
                        </div>
                        <div class="guess-analysis">
                            ${scores.map((score, i) => {
                                const map = { correct: ['found', '✓ Correct'], present: ['wrong-pos', '⚠ Wrong Pos'], absent: ['not-found', '✗ Not Found'] };
                                const [cls, lbl] = map[score];
                                return `<div class="analysis-item ${cls}">${guess[i]}<br><span class="analysis-label">${lbl}</span></div>`;
                            }).join('')}
                        </div>
                    </div>
                `;
            });
            detailsList.innerHTML = html;
            overlay.classList.remove('hidden');
        }

        function closeGuessDetails() {
            document.getElementById('guessDetailsOverlay').classList.add('hidden');
        }

        function showStats() {
            const overlay = document.getElementById('statsOverlay');
            overlay.classList.remove('hidden');
            document.querySelectorAll('.stats-tab').forEach((btn, idx) => { btn.classList.toggle('active', idx === 0); });
            document.querySelectorAll('.stats-content').forEach((c, idx) => { c.classList.toggle('active', idx === 0); });
            document.getElementById('stat-games').textContent = stats.games_played;
            document.getElementById('stat-wins').textContent = stats.wins;
            document.getElementById('stat-streak').textContent = stats.current_streak;
            document.getElementById('stat-maxstreak').textContent = stats.max_streak;
            document.getElementById('stat-avgtime').textContent = stats.win_count > 0 ? formatTime(Math.floor(stats.total_win_time / stats.win_count)) : '—';
            document.getElementById('stat-lasttime').textContent = stats.last_solve_time > 0 ? formatTime(stats.last_solve_time) : '—';
        }

        function closeStats() { document.getElementById('statsOverlay').classList.add('hidden'); }

        function switchStatsTab(tab, event) {
            document.querySelectorAll('.stats-tab').forEach(btn => btn.classList.remove('active'));
            if (event) event.target.classList.add('active');
            document.querySelectorAll('.stats-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
            if (tab === 'history') displayGameHistory();
        }

        function displayGameHistory() {
            const history = getGameHistory();
            const historyList = document.getElementById('history-list');
            if (history.length === 0) {
                historyList.innerHTML = '<div class="history-empty">No games played yet</div>';
                return;
            }
            historyList.innerHTML = history.map((game, index) => `
                <div class="history-item ${game.won ? 'won' : 'lost'}">
                    <div><span style="color:#888">#${index + 1}</span><span style="margin-left:8px;font-size:0.7rem;color:#666">${game.date}</span></div>
                    <div class="history-word">${game.word}</div>
                    <div>${game.guesses}/6</div>
                    <div style="text-align:right"><span class="history-status ${game.won ? 'won' : 'lost'}">${game.won ? '✦ WON' : '◆ LOST'}</span></div>
                </div>
            `).join('');
        }

        document.addEventListener('click', (e) => {
            if (e.target === document.getElementById('statsOverlay')) closeStats();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') { closeStats(); closeGuessDetails(); }
        });
    </script>
</body>
</html>
